<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle, #fce4ec, #fbcfe8); height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: 'Comic Sans MS', cursive; }
        .salon-box { background: white; border: 8px solid #ec4899; border-radius: 50px; padding: 20px; width: 95%; height: 95%; max-width: 500px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; box-shadow: 0 20px 50px rgba(236, 72, 153, 0.3); }
        .tool { font-size: 1.5rem; font-weight: 900; background: #fff; padding: 20px; border-radius: 30px; cursor: pointer; border: 4px solid #fbcfe8; transition: 0.3s; color: #ec4899; flex: 1; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .tool:active { transform: scale(0.9); background: #ec4899; color: white; border-color: white; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .animate-happy { animation: pulse 0.6s infinite; }
    </style>
</head>
<body>

<div class="salon-box">
    <header class="w-full text-center">
        <h1 class="text-3xl font-black text-pink-600 tracking-tight">SALÃO MÁGICO ✨</h1>
        <div class="text-pink-400 font-bold mt-1">Etapa <span id="etapa" class="text-pink-600">1</span> | Estrelas: <span id="pontos" class="text-pink-600">0</span></div>
    </header>
    
    <div id="cliente" class="text-[120px] cursor-pointer transition-all duration-500" onclick="falarPedido()">👸</div>
    
    <div id="pedido" class="text-xl font-black text-pink-700 bg-pink-100 p-4 rounded-3xl w-full text-center border-4 border-dashed border-pink-200">...</div>
    
    <div class="grid grid-cols-2 gap-4 w-full h-1/3">
        <div class="tool" onclick="verificar('🎨', 440)">🎨 Pintar</div>
        <div class="tool" onclick="verificar('💅', 554)">💅 Unhas</div>
        <div class="tool" onclick="verificar('✂️', 659)">✂️ Cortar</div>
        <div class="tool" onclick="verificar('💄', 783)">💄 Maquiar</div>
    </div>
</div>

<script>
    const pedidos = [
        { emoji: '🎨', nome: "Quero pintar!", visual: "👩‍🎨" },
        { emoji: '💅', nome: "Quero unhas!", visual: "💅👩" },
        { emoji: '✂️', nome: "Quero cortar!", visual: "💇‍♀️" },
        { emoji: '💄', nome: "Quero maquiagem!", visual: "💄👩" }
    ];
    
    let atual = {};
    let pontos = 0, acertosNaEtapa = 0, etapa = 1;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function tocarNota(freq) {
        const osc = audioCtx.createOscillator();
        osc.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.start(); osc.stop(0.2);
    }

    function falarPedido() {
        const msg = new SpeechSynthesisUtterance(atual.nome);
        msg.lang = 'pt-BR'; msg.pitch = 1.2;
        window.speechSynthesis.speak(msg);
    }

    function novoAtendimento() {
        atual = pedidos[Math.floor(Math.random() * pedidos.length)];
        document.getElementById('cliente').innerText = "👸";
        document.getElementById('pedido').innerText = atual.nome;
        falarPedido();
    }

    function verificar(emoji, freq) {
        if (emoji === atual.emoji) {
            pontos++; acertosNaEtapa++;
            tocarNota(freq);
            document.getElementById('pontos').innerText = pontos;
            document.getElementById('cliente').innerText = atual.visual;
            document.getElementById('cliente').classList.add('animate-happy');
            
            if (acertosNaEtapa >= 3) {
                setTimeout(() => {
                    etapa++; acertosNaEtapa = 0;
                    document.getElementById('etapa').innerText = etapa;
                    alert("🌟 Uau! Você completou a etapa! Você é uma estrela do salão!");
                    novoAtendimento();
                }, 1000);
            } else {
                setTimeout(() => {
                    document.getElementById('cliente').classList.remove('animate-happy');
                    novoAtendimento();
                }, 1000);
            }
        } else {
            tocarNota(220); // Som de erro
            document.getElementById('cliente').innerText = "🤔";
        }
    }

    novoAtendimento();
</script>
</body>
</html>
