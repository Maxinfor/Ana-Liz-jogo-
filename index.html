<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #ff9a9e, #fad0c4); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: 'Comic Sans MS', cursive; }
        .salon-box { background: #ffffff; border: 8px solid #fff; border-radius: 40px; padding: 15px; width: 98%; height: 98%; max-width: 500px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .grid-tools { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; height: 45%; }
        .tool { font-size: 0.8rem; font-weight: bold; background: #ffebf0; padding: 10px; border-radius: 20px; cursor: pointer; border: 3px solid #ffb7c5; transition: 0.2s; color: #ff6b8d; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .tool:active { transform: scale(0.9); background: #ff6b8d; color: white; }
    </style>
</head>
<body>

<div class="salon-box">
    <header class="w-full text-center">
        <h1 class="text-2xl font-black text-pink-500">SALГғO MГҒGICO вңЁ</h1>
        <div class="text-sm font-bold text-pink-400">Fase <span id="fase">1</span> | Estrelas: <span id="pontos">0</span></div>
    </header>
    
    <div id="cliente" class="text-[70px] cursor-pointer" onclick="falarPedido()">рҹ‘ё</div>
    <div id="pedido" class="text-md font-bold text-pink-600 bg-pink-50 p-3 rounded-2xl w-full text-center border-2 border-dashed border-pink-200">...</div>
    
    <div class="grid-tools">
        <div class="tool" onclick="verificar('рҹҺЁ')">рҹҺЁ Pintar</div>
        <div class="tool" onclick="verificar('рҹ’…')">рҹ’… Unhas</div>
        <div class="tool" onclick="verificar('вңӮпёҸ')">вңӮпёҸ Cortar</div>
        <div class="tool" onclick="verificar('рҹ’„')">рҹ’„ Maquiar</div>
        <div class="tool" onclick="verificar('рҹҡҝ')">рҹҡҝ Lavar</div>
        <div class="tool" onclick="verificar('рҹ§–вҖҚвҷҖпёҸ')">рҹ§–вҖҚвҷҖпёҸ Hidratar</div>
        <div class="tool" onclick="verificar('рҹ’ҶвҖҚвҷҖпёҸ')">рҹ’ҶвҖҚвҷҖпёҸ Massagem</div>
        <div class="tool" onclick="verificar('вңЁ')">вңЁ Perfumar</div>
        <div class="tool" onclick="verificar('рҹ§ј')">рҹ§ј Limpar</div>
        <div class="tool" onclick="verificar('рҹ§ҙ')">рҹ§ҙ Creme</div>
        <div class="tool" onclick="verificar('рҹҺҖ')">рҹҺҖ LaГ§o</div>
        <div class="tool" onclick="verificar('рҹ•¶пёҸ')">рҹ•¶пёҸ Г“culos</div>
    </div>
</div>

<script>
    const pedidos = [
        { emoji: 'рҹҺЁ', nome: "Pinta meu cabelo!", visual: "рҹ‘©вҖҚрҹҺЁ" },
        { emoji: 'рҹ’…', nome: "Faz minhas unhas!", visual: "рҹ’…рҹ‘©" },
        { emoji: 'вңӮпёҸ', nome: "Corta meu cabelo!", visual: "рҹ’ҮвҖҚвҷҖпёҸ" },
        { emoji: 'рҹ’„', nome: "Passa maquiagem!", visual: "рҹ’„рҹ‘©" },
        { emoji: 'рҹҡҝ', nome: "Lava meu cabelo!", visual: "рҹҡҝрҹ‘©" },
        { emoji: 'рҹ§–вҖҚвҷҖпёҸ', nome: "Hidrata meu cabelo!", visual: "рҹ§–вҖҚвҷҖпёҸ" },
        { emoji: 'рҹ’ҶвҖҚвҷҖпёҸ', nome: "Faz uma massagem!", visual: "рҹ’ҶвҖҚвҷҖпёҸ" },
        { emoji: 'вңЁ', nome: "Passa um perfume!", visual: "вңЁрҹ‘©" },
        { emoji: 'рҹ§ј', nome: "Limpa meu rosto!", visual: "рҹ§јрҹ‘©" },
        { emoji: 'рҹ§ҙ', nome: "Passa um creme!", visual: "рҹ§ҙрҹ‘©" },
        { emoji: 'рҹҺҖ', nome: "Coloca um laГ§o!", visual: "рҹҺҖрҹ‘©" },
        { emoji: 'рҹ•¶пёҸ', nome: "Coloca meus Гіculos!", visual: "рҹ•¶пёҸрҹ‘©" }
    ];
    
    let atual = {}, pontos = 0, acertosFase = 0, fase = 1;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function tocarGritoAlegria() {
        // SequГӘncia de notas rГЎpidas simulando um "Iahhhool"
        [880, 1100, 1300, 1700].forEach((freq, i) => {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.frequency.value = freq;
                osc.start(); osc.stop(0.15);
            }, i * 150);
        });
    }

    function falarPedido() {
        const msg = new SpeechSynthesisUtterance(atual.nome);
        msg.lang = 'pt-BR'; 
        msg.pitch = 1.8; // Voz mais aguda (infantil)
        msg.rate = 1.1;  // Um pouco mais rГЎpido
        window.speechSynthesis.speak(msg);
    }

    function novoAtendimento() {
        atual = pedidos[Math.floor(Math.random() * pedidos.length)];
        document.getElementById('cliente').innerText = "рҹ‘ё";
        document.getElementById('pedido').innerText = atual.nome;
        falarPedido();
    }

    function verificar(emoji) {
        if (emoji === atual.emoji) {
            pontos++; acertosFase++;
            document.getElementById('pontos').innerText = pontos;
            document.getElementById('cliente').innerText = atual.visual;
            
            if (acertosFase >= 5) {
                tocarGritoAlegria(); // Toca o Iahhhool
                setTimeout(() => {
                    fase++; acertosFase = 0;
                    document.getElementById('fase').innerText = fase;
                    alert("рҹҢҹ Uau! Iahhhool! VocГӘ Г© uma estrela, Fase " + fase + "!");
                    novoAtendimento();
                }, 800);
            } else {
                setTimeout(novoAtendimento, 500);
            }
        } else {
            document.getElementById('cliente').innerText = "рҹӨ”";
            setTimeout(() => document.getElementById('cliente').innerText = "рҹ‘ё", 500);
        }
    }

    novoAtendimento();
</script>
</body>
</html>
