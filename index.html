<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #ffdee9; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: 'Comic Sans MS', cursive; }
        .salon-box { background: white; border-radius: 30px; padding: 10px; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid-tools { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; margin-top: 10px; }
        .tool { width: 22%; font-size: 0.7rem; background: #fff0f5; padding: 8px 2px; border-radius: 15px; border: 2px solid #ffb6c1; cursor: pointer; text-align: center; }
        #cliente { font-size: 60px; cursor: pointer; }
    </style>
</head>
<body>

<div class="salon-box">
    <h1 class="text-xl font-black text-pink-500">SALÃO MÁGICO ✨</h1>
    <div class="text-sm font-bold text-pink-400">Fase <span id="fase">1</span> | Estrelas: <span id="pontos">0</span></div>
    
    <div id="cliente" onclick="falarPedido()">👸</div>
    <div id="pedido" class="text-sm font-bold text-pink-600 bg-pink-100 p-2 rounded-xl my-2">Clique na princesa!</div>
    
    <div class="grid-tools">
        <div class="tool" onclick="verificar('🎨')">🎨 Pintar</div>
        <div class="tool" onclick="verificar('💅')">💅 Unhas</div>
        <div class="tool" onclick="verificar('✂️')">✂️ Cortar</div>
        <div class="tool" onclick="verificar('💄')">💄 Maquiar</div>
        <div class="tool" onclick="verificar('🚿')">🚿 Lavar</div>
        <div class="tool" onclick="verificar('🧖‍♀️')">🧖‍♀️ Hidratar</div>
        <div class="tool" onclick="verificar('💆‍♀️')">💆‍♀️ Massagem</div>
        <div class="tool" onclick="verificar('✨')">✨ Perfumar</div>
        <div class="tool" onclick="verificar('🧼')">🧼 Limpar</div>
        <div class="tool" onclick="verificar('🧴')">🧴 Creme</div>
        <div class="tool" onclick="verificar('🎀')">🎀 Laço</div>
        <div class="tool" onclick="verificar('🕶️')">🕶️ Óculos</div>
    </div>
</div>

<script>
    const pedidos = [
        { emoji: '🎨', nome: "Pinta meu cabelo!", visual: "👩‍🎨" },
        { emoji: '💅', nome: "Faz minhas unhas!", visual: "💅👩" },
        { emoji: '✂️', nome: "Corta meu cabelo!", visual: "💇‍♀️" },
        { emoji: '💄', nome: "Passa maquiagem!", visual: "💄👩" },
        { emoji: '🚿', nome: "Lava meu cabelo!", visual: "🚿👩" },
        { emoji: '🧖‍♀️', nome: "Hidrata meu cabelo!", visual: "🧖‍♀️" },
        { emoji: '💆‍♀️', nome: "Faz uma massagem!", visual: "💆‍♀️" },
        { emoji: '✨', nome: "Passa um perfume!", visual: "✨👩" },
        { emoji: '🧼', nome: "Limpa meu rosto!", visual: "🧼👩" },
        { emoji: '🧴', nome: "Passa um creme!", visual: "🧴👩" },
        { emoji: '🎀', nome: "Coloca um laço!", visual: "🎀👩" },
        { emoji: '🕶️', nome: "Coloca meus óculos!", visual: "🕶️👩" }
    ];
    
    let atual = {}, pontos = 0, acertosFase = 0, fase = 1;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function tocarGritoAlegria() {
        const notas = [880, 1100, 1300, 1700];
        notas.forEach((freq, i) => {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.frequency.value = freq;
                osc.start(); osc.stop(0.1);
            }, i * 100);
        });
    }

    function falarPedido() {
        const msg = new SpeechSynthesisUtterance(atual.nome);
        msg.lang = 'pt-BR';
        // Tenta encontrar uma voz feminina/infantil
        const voices = window.speechSynthesis.getVoices();
        msg.voice = voices.find(v => v.name.includes('Luciana') || v.name.includes('Google português')) || null;
        msg.pitch = 2; // Voz bem aguda
        msg.rate = 1.2;
        window.speechSynthesis.speak(msg);
    }

    function novoAtendimento() {
        atual = pedidos[Math.floor(Math.random() * pedidos.length)];
        document.getElementById('cliente').innerText = "👸";
        document.getElementById('pedido').innerText = atual.nome;
        falarPedido();
    }

    function verificar(emoji) {
        if (emoji === atual.emoji) {
            pontos++; acertosFase++;
            document.getElementById('pontos').innerText = pontos;
            document.getElementById('cliente').innerText = atual.visual;
            
            if (acertosFase >= 3) {
                tocarGritoAlegria();
                setTimeout(() => {
                    fase++; acertosFase = 0;
                    document.getElementById('fase').innerText = fase;
                    alert("Iahhhool! Fase " + fase + "!");
                    novoAtendimento();
                }, 800);
            } else {
                setTimeout(novoAtendimento, 500);
            }
        } else {
            document.getElementById('cliente').innerText = "🤔";
            setTimeout(() => document.getElementById('cliente').innerText = "👸", 500);
        }
    }

    novoAtendimento();
</script>
</body>
</html>
